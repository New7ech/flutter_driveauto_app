name: flutter_driveauto_app
description: "Application DriveAuto pour apprenants auto-école (Burkina Faso)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  
  # Firebase Services
  firebase_core: ^3.3.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0

  # Media
  image_picker: ^1.1.2
  
  # Offline Cache & Sync
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  
  # Engine & UI/Animations
  flame: ^1.18.0
  lottie: ^3.1.2
  youtube_player_flutter: ^9.1.0
  google_fonts: ^6.2.1
  
  # Utilities
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  freezed_annotation: any
  json_annotation: any
  http: ^1.6.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  mockito: any
  build_runner: any
  freezed: any
  json_serializable: any
  hive_generator: any

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - .env
